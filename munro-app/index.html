<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Munro Bagger</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Top bar: brand + progress + controls -->
  <header id="topbar">
    <div class="brand">
      <span class="mark">▲</span>
      <span class="name">Munro Bagger</span>
    </div>
    <div class="progress">
      <div class="count"><strong id="count-done">0</strong> <span>/ 282</span></div>
      <div class="bar"><div id="bar-fill"></div></div>
      <div class="pct" id="count-pct">0%</div>
    </div>
    <div class="controls">
      <div class="segmented" id="filter">
        <button data-filter="all" class="active">All</button>
        <button data-filter="unbagged">To do</button>
        <button data-filter="bagged">Bagged</button>
      </div>
      <div class="menu">
        <button id="export-btn" title="Export your tick list">Export ▾</button>
        <div class="menu-list" id="export-menu" hidden>
          <button data-export="csv">Download CSV</button>
          <button data-export="json">Download JSON</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Selection panel -->
  <aside id="panel" hidden>
    <button id="panel-close" aria-label="Close">×</button>
    <div id="panel-body"></div>
  </aside>

  <div id="hint">Click a summit to begin</div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
